name: install-fish-shell-from-github
description: Installs fish shell from its GitHub releases

inputs:
  fish-version:
    description: "fish version corresponding to a release tag, '4.1.0' or later."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install fish
      if: runner.os == 'linux'
      env:
        ACTION_FISH_VERSION: ${{ inputs.fish-version }}
      shell: bash
      run: ./install.sh "${ACTION_FISH_VERSION}"

    - name: Cannot install fish
      if: runner.os != 'linux'
      shell: bash
      run: |
        echo "Only Linux is supported." >&2
        exit 1

branding:
  icon: download
  color: green
